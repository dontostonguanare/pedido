<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido - Don Tostón</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="contenedor-principal">
        <h1>Pedido - Don Tostón</h1>
        <div id="formulario-pedido">
            
            <div class="seccion-datos">
                <h2>Datos de Entrega</h2>
                <div class="tasa-bcv-box">
                    <label for="tasa-bcv">Tasa Oficial BCV del día (Bs.):</label>
                    <input type="number" id="tasa-bcv" step="0.01" value="736.93">
                </div>
                <div class="grupo-campo">
                    <label for="nombre-cliente">Nombre Completo:</label>
                    <input type="text" id="nombre-cliente" placeholder="Ej. Juan Pérez">
                </div>
                <div class="grupo-campo">
                    <label for="direccion-cliente">Dirección de Envío:</label>
                    <input type="text" id="direccion-cliente" placeholder="Ej. Guanare, Edo. Portuguesa">
                </div>
            </div>
            
            <div class="seccion-tamano">
                <h2>Presentación 60g ($0.75)</h2>
                <div class="contenedor-sabores">
                    <div class="tarjeta-producto sabor-natural-60g">
                        <h3>Natural (60g)</h3>
                        <div class="precio-producto">$0.75</div>
                        <div class="campo-cantidad"><label>Cantidad:</label><input type="number" id="60g-natural" min="0" value="0" class="input-cantidad"></div>
                    </div>
                    <div class="tarjeta-producto sabor-cheddar-60g">
                        <h3>Cheddar (60g)</h3>
                        <div class="precio-producto">$0.75</div>
                        <div class="campo-cantidad"><label>Cantidad:</label><input type="number" id="60g-cheddar" min="0" value="0" class="input-cantidad"></div>
                    </div>
                    <div class="tarjeta-producto sabor-ajo-60g">
                        <h3>Ajo (60g)</h3>
                        <div class="precio-producto">$0.75</div>
                        <div class="campo-cantidad"><label>Cantidad:</label><input type="number" id="60g-ajo" min="0" value="0" class="input-cantidad"></div>
                    </div>
                    <div class="tarjeta-producto sabor-picante-60g">
                        <h3>Picante (60g)</h3>
                        <div class="precio-producto">$0.75</div>
                        <div class="campo-cantidad"><label>Cantidad:</label><input type="number" id="60g-picante" min="0" value="0" class="input-cantidad"></div>
                    </div>
                </div>
            </div>

            <div class="seccion-tamano">
                <h2>Presentación 120g ($1.00)</h2>
                <div class="contenedor-sabores">
                    <div class="tarjeta-producto sabor-natural-120g">
                        <h3>Natural (120g)</h3>
                        <div class="precio-producto">$1.00</div>
                        <div class="campo-cantidad"><label>Cantidad:</label><input type="number" id="120g-natural" min="0" value="0" class="input-cantidad"></div>
                    </div>
                    <div class="tarjeta-producto sabor-cheddar-120g">
                        <h3>Cheddar (120g)</h3>
                        <div class="precio-producto">$1.00</div>
                        <div class="campo-cantidad"><label>Cantidad:</label><input type="number" id="120g-cheddar" min="0" value="0" class="input-cantidad"></div>
                    </div>
                    <div class="tarjeta-producto sabor-ajo-120g">
                        <h3>Ajo (120g)</h3>
                        <div class="precio-producto">$1.00</div>
                        <div class="campo-cantidad"><label>Cantidad:</label><input type="number" id="120g-ajo" min="0" value="0" class="input-cantidad"></div>
                    </div>
                    <div class="tarjeta-producto sabor-picante-120g">
                        <h3>Picante (120g)</h3>
                        <div class="precio-producto">$1.00</div>
                        <div class="campo-cantidad"><label>Cantidad:</label><input type="number" id="120g-picante" min="0" value="0" class="input-cantidad"></div>
                    </div>
                </div>
            </div>

            <div class="barra-total">
                <div class="monto-total">
                    Total: $<span id="total-usd">0.00</span>
                    <span class="monto-bs">Equivalente: Bs. <span id="total-bs">0.00</span></span>
                </div>
                <button type="button" onclick="procesarYEnviarWhatsApp()" class="boton-enviar">Enviar por WhatsApp</button>
            </div>
        </div>
    </div>
    
    <script src="calculos.js"></script>
    <script>
        function procesarYEnviarWhatsApp() {
            const numeroTelefono = "584162755555";
            const nombre = document.getElementById('nombre-cliente').value.trim();
            const direccion = document.getElementById('direccion-cliente').value.trim();
            const tasaBCV = document.getElementById('tasa-bcv').value;

            if (nombre === "" || direccion === "") {
                alert("Por favor, introduce tu Nombre y Dirección de entrega.");
                return;
            }

            const productos = [
                { nombre: "Natural (60g)", id: "60g-natural" },
                { nombre: "Cheddar (60g)", id: "60g-cheddar" },
                { nombre: "Ajo (60g)", id: "60g-ajo" },
                { nombre: "Picante (60g)", id: "60g-picante" },
                { nombre: "Natural (120g)", id: "120g-natural" },
                { nombre: "Cheddar (120g)", id: "120g-cheddar" },
                { nombre: "Ajo (120g)", id: "120g-ajo" },
                { nombre: "Picante (120g)", id: "120g-picante" }
            ];

            let listaProductos = "";
            productos.forEach(prod => {
                const cantidad = parseInt(document.getElementById(prod.id).value) || 0;
                if (cantidad > 0) {
                    listaProductos += `• ${prod.nombre} x${cantidad}\n`;
                }
            });

            if (listaProductos === "") {
                alert("Por favor, agrega al menos 1 producto a tu pedido.");
                return;
            }

            const totalUSD = document.getElementById('total-usd').innerText;
            const totalBS = document.getElementById('total-bs').innerText;

            let mensaje = `*🔥 ¡NUEVO PEDIDO - DON TOSTÓN!* 🔥\n\n`;
            mensaje += `*👤 Cliente:* ${nombre}\n`;
            mensaje += `*📍 Dirección:* ${direccion}\n\n`;
            mensaje += `*📦 Productos:* \n${listaProductos}\n`;
            mensaje += `*💵 Total USD:* $${totalUSD}\n`;
            mensaje += `*🇻🇪 Total Bs.:* Bs. ${totalBS}\n\n`;
            mensaje += `_(Tasa BCV calculada: Bs. ${tasaBCV})_`;

    
            const urlWhatsApp = `https://wa.me{numeroTelefono}?text=${encodeURIComponent(mensaje)}`;
            
            window.location.href = urlWhatsApp;
        }
    </script>
</body>
                                                                                </html>
